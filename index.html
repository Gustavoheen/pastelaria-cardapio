  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <div id="root"></div>
  <script>
    // Force cache bust v2 — redirecionar com timestamp se JS estiver velho
    if ('serviceWorker' in navigator) navigator.serviceWorker.getRegistrations().then(r => r.forEach(w => w.unregister()))
    if ('caches' in window) caches.keys().then(k => k.forEach(c => caches.delete(c)))
    // Forcar reload se versao antiga (sem ?v= ou com v= antigo)
    var BUILD_VER = '20260424f'
    if (!location.search.includes('v=' + BUILD_VER)) {
      var sep = location.search ? '&' : '?'
      location.replace(location.pathname + location.search.replace(/[?&]v=[^&]*/g, '') + sep + 'v=' + BUILD_VER)
    }
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
